{% extends "base.html" %}

{% block title %}Reset Password - MafurikoAI{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        
        <div class="auth-logo">
            <div class="logo-icon">🔑</div>
            <h1 class="logo-text">Mafuriko<span>AI</span></h1>
            <p class="logo-tagline">Create New Password</p>
        </div>
        
        <form method="POST" class="auth-form">
            <h2 class="form-title">Reset Password</h2>
            <p class="form-subtitle">Enter your new password below</p>
            
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="New Password" required minlength="6">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="confirm_password" placeholder="Confirm New Password" required minlength="6">
            </div>
            
            <div style="background: rgba(0,242,254,0.1); padding: 12px; border-radius: 8px; margin: 15px 0; font-size: 0.85rem;">
                <i class="fas fa-shield-alt"></i> Password must be at least 6 characters
            </div>
            
            <button type="submit" class="btn-primary">
                <i class="fas fa-check"></i> Reset Password
            </button>
            
            <div class="auth-footer">
                <p><a href="{{ url_for('main.login') }}">← Back to Login</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
