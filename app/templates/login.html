{% extends "base.html" %}

{% block title %}Login - MafurikoAI{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        
        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">🌧️</div>
            <h1 class="logo-text">Mafuriko<span>AI</span></h1>
            <p class="logo-tagline">Flood Safety for Kenya 🇰🇪</p>
        </div>
        
        <!-- Login Form -->
        <form method="POST" class="auth-form">
            <h2 class="form-title">Welcome Back!</h2>
            <p class="form-subtitle">Login to check flood risks in your area</p>
            
            <div class="input-group">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" placeholder="Username or Email" required autofocus>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" placeholder="Password" required>
                <i class="fas fa-eye toggle-password" onclick="togglePassword(this)"></i>
            </div>
            
            <button type="submit" class="btn-primary">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            
           <div class="auth-footer">
    <p>
        <a href="{{ url_for('main.forgot_password') }}" style="color: #4facfe;">
            <i class="fas fa-key"></i> Forgot Password?
        </a>
    </p>
    <p style="margin-top: 10px;">Don't have an account? <a href="{{ url_for('main.signup') }}">Sign up here</a></p>
</div>
        </form>
        

    </div>
</div>

<script>
function togglePassword(icon) {
    const input = icon.previousElementSibling.previousElementSibling;
    if (input.type === "password") {
        input.type = "text";
        icon.classList.remove("fa-eye");
        icon.classList.add("fa-eye-slash");
    } else {
        input.type = "password";
        icon.classList.remove("fa-eye-slash");
        icon.classList.add("fa-eye");
    }
}
</script>
{% endblock %}
